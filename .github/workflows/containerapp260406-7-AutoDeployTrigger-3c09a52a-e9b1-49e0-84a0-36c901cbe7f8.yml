name: Trigger auto deployment for containerapp260406-7

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/containerapp260406-7-AutoDeployTrigger-3c09a52a-e9b1-49e0-84a0-36c901cbe7f8.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CONTAINERAPP2604067_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CONTAINERAPP2604067_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CONTAINERAPP2604067_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.CONTAINERAPP2604067_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CONTAINERAPP2604067_REGISTRY_PASSWORD }}
          containerAppName: containerapp260406-7
          resourceGroup: ContainerApp260406-7
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


